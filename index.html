  <body>
    <div id="root"></div>
    <script>
      (function () {
        var REPO = "/portfolio";

        var search = window.location.search;

        if (search.startsWith("?p=")) {
          // Decode the route that 404.html encoded
          // e.g. ?p=%2Fdata-viz  →  /data-viz
          var route = decodeURIComponent(search.slice(3));
          var hash = window.location.hash;

          // Restore the full clean URL: /portfolio/data-viz
          // history.replaceState does NOT trigger a page reload —
          // React Router will boot and see the correct pathname.
          window.history.replaceState(null, "", REPO + route + hash);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
